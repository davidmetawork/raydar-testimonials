<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raydar | Testimonials</title>
    <meta http-equiv="refresh" content="0; url=/testimonial/candidate/">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0F0F0F; color: #F6F3E9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px 20px; }
        h1 { font-size: 32px; margin-bottom: 16px; }
        p { font-size: 16px; color: #9A978F; margin-bottom: 32px; }
        .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        a { display: inline-block; padding: 14px 28px; background: #FF6E00; color: #FFF; text-decoration: none; border-radius: 40px; font-weight: 600; font-size: 15px; transition: all 0.25s ease; }
        a:hover { background: #E56200; transform: translateY(-1px); }
        .alt { background: transparent; color: #7F72FF; border: 1.5px solid #7F72FF; }
        .alt:hover { color: #8B87FF; border-color: #8B87FF; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Raydar Testimonials</h1>
        <p>Share your experience working with Raydar. Select the testimonial form that applies to you:</p>
        <div class="links">
            <a href="/testimonial/candidate/">Candidate Testimonial</a>
            <a href="/testimonial/client/" class="alt">Client Testimonial</a>
        </div>
    </div>
</body>
</html>
